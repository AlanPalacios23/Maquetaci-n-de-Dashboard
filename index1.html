<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Profesional</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- Header -->
  <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-800">Dashboard</h1>
    <div class="text-gray-500">Bienvenido, Admin</div>
  </header>

  <main class="p-8">

    <!-- Estadísticas -->
    <div class="grid grid-cols-4 gap-6 mb-8">

      <div class="bg-white p-6 rounded-2xl shadow hover:shadow-lg transition">
        <p class="text-sm text-gray-500">Usuarios Totales</p>
        <h2 class="text-3xl font-bold mt-2 text-blue-500">8,249</h2>
        <p class="text-green-500 text-sm mt-2">+12% este mes</p>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow hover:shadow-lg transition">
        <p class="text-sm text-gray-500">Ingresos</p>
        <h2 class="text-3xl font-bold mt-2 text-indigo-500">$24,780</h2>
        <p class="text-green-500 text-sm mt-2">+8% este mes</p>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow hover:shadow-lg transition">
        <p class="text-sm text-gray-500">Ventas</p>
        <h2 class="text-3xl font-bold mt-2 text-purple-500">1,245</h2>
        <p class="text-red-500 text-sm mt-2">-3% este mes</p>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow hover:shadow-lg transition">
        <p class="text-sm text-gray-500">Conversiones</p>
        <h2 class="text-3xl font-bold mt-2 text-pink-500">4.5%</h2>
        <p class="text-green-500 text-sm mt-2">+2% este mes</p>
      </div>

    </div>

    <!-- Gráficas -->
    <div class="grid grid-cols-2 gap-6">

      <div class="bg-white p-6 rounded-2xl shadow h-96">
        <h2 class="text-lg font-semibold mb-4 text-gray-700">
          Crecimiento de Usuarios
        </h2>
        <canvas id="lineChart"></canvas>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow h-96">
        <h2 class="text-lg font-semibold mb-4 text-gray-700">
          Ingresos Mensuales
        </h2>
        <canvas id="barChart"></canvas>
      </div>

    </div>

  </main>

  <!-- Script Gráficas -->
  <script>
    const lineCtx = document.getElementById('lineChart').getContext('2d');
    new Chart(lineCtx, {
      type: 'line',
      data: {
        labels: ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'],
        datasets: [{
          label: 'Usuarios 2024',
          data: [5000,5500,6000,6200,6800,7200,7500,8000,8249,8500,8800,9100],
          borderColor: 'rgb(59,130,246)',
          backgroundColor: 'rgba(59,130,246,0.1)',
          tension: 0.4,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false
      }
    });

    const barCtx = document.getElementById('barChart').getContext('2d');
    new Chart(barCtx, {
      type: 'bar',
      data: {
        labels: ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'],
        datasets: [{
          label: 'Ingresos 2024 ($)',
          data: [15000,16500,18000,19500,21000,22500,23000,24000,24780,26000,27500,29000],
          backgroundColor: 'rgba(99,102,241,0.8)'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false
      }
    });
  </script>

</body>
</html>
